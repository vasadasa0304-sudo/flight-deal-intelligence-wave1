services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flight_deals}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_grain_constraints.sql:/docker-entrypoint-initdb.d/002_grain_constraints.sql:ro
      - ./migrations/003_detector_dedup_constraint.sql:/docker-entrypoint-initdb.d/003_detector_dedup_constraint.sql:ro
      - ./migrations/004_qa_checks_external_flag.sql:/docker-entrypoint-initdb.d/004_qa_checks_external_flag.sql:ro
      - ./migrations/005_alerts_dedup_constraint.sql:/docker-entrypoint-initdb.d/005_alerts_dedup_constraint.sql:ro
      - ./migrations/006_quota.sql:/docker-entrypoint-initdb.d/006_quota.sql:ro
      - ./migrations/007_backtest.sql:/docker-entrypoint-initdb.d/007_backtest.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-flight_deals}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      # Override DATABASE_URL so the app reaches postgres by service name, not localhost.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-flight_deals}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-flight_deals}
    command: ["python", "scripts/run_scheduler.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer
    profiles: [tools]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
